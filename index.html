<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Bot-Contador</title>
    <script>
        // Pega o caminho atual do site (com o nome do repositório) e adiciona a pasta public
        var currentPath = window.location.pathname;
        if (!currentPath.endsWith('/')) {
            currentPath += '/';
        }
        window.location.replace(window.location.origin + currentPath + "public/index.html");
    </script>
</head>

<body>
    <noscript>
        <p>Se você não for redirecionado automaticamente, por favor <a href="./public/index.html">clique aqui</a>.</p>
    </noscript>
</body>

</html>
